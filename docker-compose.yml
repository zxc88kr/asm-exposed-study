version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: exposed-postgres
    environment:
      POSTGRES_DB:       exposed_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "3232:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exposed_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
